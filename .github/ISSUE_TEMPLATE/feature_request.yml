name: 💡 Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! No promises on what gets built (it's a one-person hobby project), but
        well-described suggestions are genuinely appreciated. For open-ended ideas you'd rather discuss,
        a [Discussion](https://github.com/rhybad/gog-vault/discussions) is also great.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and discussions for something similar.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the need, not just the solution — it makes finding the right fix much easier.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like it to do.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / workarounds
      description: Anything you've tried or considered.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: GOG Vault is for personal archival of installers you own.
      options:
        - label: This stays within "back up / verify / restore your own GOG library" (no launcher, no DRM bypass).
          required: true
